spring.application.name=creator-settlement-api

server.port=${SERVER_PORT:8080}
app.seed.enabled=${APP_SEED_ENABLED:true}

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/creator_java?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
spring.datasource.username=${DB_USERNAME:creator_app}
spring.datasource.password=${DB_PASSWORD:creator_pass}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Seoul

spring.jackson.time-zone=Asia/Seoul

logging.level.org.hibernate.SQL=info
