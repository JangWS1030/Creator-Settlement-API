services:
  app:
    build: .
    image: ${APP_IMAGE:-sikersiker/creator-settlement-api:latest}
    container_name: creator-settlement-api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      APP_SEED_ENABLED: ${APP_SEED_ENABLED:-true}
      DB_URL: "jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-creator_java}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8"
      DB_USERNAME: ${MYSQL_USER:-creator_app}
      DB_PASSWORD: ${MYSQL_PASSWORD:-creator_pass}
      JPA_DDL_AUTO: ${JPA_DDL_AUTO:-update}
      TZ: Asia/Seoul
    ports:
      - "${APP_PORT:-8080}:8080"

  mysql:
    image: mysql:8.4
    container_name: creator-java-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-creator_java}
      MYSQL_USER: ${MYSQL_USER:-creator_app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-creator_pass}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-creator_root_pass}
      TZ: Asia/Seoul
    ports:
      - "3306:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --log-bin-trust-function-creators=1
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
